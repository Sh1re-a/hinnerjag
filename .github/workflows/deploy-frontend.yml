name: Deploy frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      REPOSITORY: ${{ vars.GCP_ARTIFACT_REGISTRY }}
      SERVICE_NAME: ${{ vars.GCP_FRONTEND_SERVICE }}
      IMAGE_NAME: hinnerjag-frontend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug repo (verify Dockerfile present)
        run: |
          echo "PWD: $(pwd)"
          ls -la
          echo "--- frontend directory ---"
          ls -la frontend || true
          echo "--- frontend/Dockerfile ---"
          sed -n '1,200p' frontend/Dockerfile || true

      - uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ env.PROJECT_ID }}
          region: ${{ env.REGION }}

      - name: Set gcloud project
        run: gcloud config set project "$PROJECT_ID"

      - name: Create frontend env
        run: |
          cat > frontend/.env <<EOF
          VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          VITE_MAPBOX_KEY=${{ secrets.VITE_MAPBOX_KEY }}
          EOF

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker "${{ env.REGION }}-docker.pkg.dev" --quiet

      - name: Build and push frontend image (docker/build-push-action@v4)
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          platforms: linux/amd64

      - name: Deploy to Cloud Run
        env:
          IMAGE_URI: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --project "$PROJECT_ID" \
            --image "$IMAGE_URI" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 80
