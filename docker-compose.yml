
services:
  backend:
    build:
      context: ./backend
    container_name: hinnerjag-backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
    container_name: hinnerjag-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
