    <rect x="42" y="42" width="216" height="58" rx="18" fill="#102238"/>
    <text x="68" y="80" fill="#93c5fd" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Tunnelbana</text>
    <text x="42" y="170" fill="#34d399" font-family="Inter, Arial, sans-serif" font-size="86" font-weight="800">4 min</text>
    <text x="46" y="226" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="600">Gå nu</text>
    <path d="M44 270h212" stroke="#1f3348" stroke-width="6" stroke-linecap="round"/>
    <path d="M44 270h132" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
